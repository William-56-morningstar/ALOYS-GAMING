<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>ALOYS GAMING | HUB</title>
                <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
                    <style>
                            :root { --neon: #00f2ff; --bg: #050508; --card: #0a0a0f; }
                                    body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 50px; }
                                            header { padding: 40px 20px; text-align: center; border-bottom: 1px solid rgba(0,242,255,0.2); }
                                                    h1 { font-family: 'Orbitron'; font-size: 2.5rem; color: var(--neon); text-shadow: 0 0 15px var(--neon); margin: 0; }
                                                            .user-stats { margin-top: 15px; font-family: 'Orbitron'; font-size: 0.9rem; opacity: 0.8; }
                                                                    .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
                                                                            .card-wrapper { position: relative; background: var(--card); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 30px; transition: 0.4s; }
                                                                                    .card-wrapper:hover { border-color: var(--neon); transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,242,255,0.1); }
                                                                                            .icon { font-size: 3rem; margin-bottom: 20px; }
                                                                                                    h3 { font-family: 'Orbitron'; margin: 0 0 10px 0; color: var(--neon); }
                                                                                                            p { color: #888; font-size: 0.95rem; line-height: 1.6; }
                                                                                                                    .play-btn { display: inline-block; margin-top: 20px; padding: 12px 30px; border: 1px solid var(--neon); color: var(--neon); text-decoration: none; font-family: 'Orbitron'; font-size: 0.8rem; border-radius: 5px; transition: 0.3s; }
                                                                                                                            .play-btn:hover { background: var(--neon); color: black; }
                                                                                                                                    footer { text-align: center; font-family: 'Orbitron'; font-size: 0.7rem; opacity: 0.4; margin-top: 50px; }
                                                                                                                                        </style>
                                                                                                                                        </head>
                                                                                                                                        <body>

                                                                                                                                            <header>
                                                                                                                                                    <h1>ALOYS GAMING</h1>
                                                                                                                                                            <div class="user-stats">SESSION: WILLIAM ALOYS | XP: <span id="hub-xp">0</span></div>
                                                                                                                                                                </header>

                                                                                                                                                                            <div class="card-wrapper">

                                                                                                                                                                                                                <p>Culture générale, Sciences & Tech. Le test ultime avec chrono de 15s.</p>
                                                                                                                                                                                                                            <a href="modules/quiz-culture/index.html" class="play-btn">INITIALISER</a>
                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                            <div class="card-wrapper">
                                                                                                                                                                                                                                                        <div class="icon">⚡</div>

                                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                                                                        // Synchronisation du score global
                                                                                                                                                                                                                                                                                                                                const score = localStorage.getItem('aloys_xp') || 0;
                                                                                                                                                                                                                                                                                                                                        document.getElementById('hub-xp').innerText = score;

                                                                                                                                                                                                                                                                                                                                            </html>
