<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>OMNI-QUIZ INFINITY</title>
                <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
                    <style>
                            body { background: #050508; color: white; font-family: 'Orbitron', sans-serif; text-align: center; margin: 0; }
                                    .header { padding: 20px; color: #00f2ff; border-bottom: 2px solid #00f2ff; text-shadow: 0 0 10px #00f2ff; }
                                            #timer-bar { height: 5px; background: #00f2ff; width: 100%; transition: width 1s linear; }
                                                    .question { font-size: 1.2rem; margin: 30px 20px; min-height: 80px; font-family: 'Inter', sans-serif; }
                                                            .options-grid { display: grid; grid-template-columns: 1fr; gap: 15px; padding: 20px; }
                                                                    button { background: rgba(0,242,255,0.05); border: 1px solid #00f2ff; color: white; padding: 15px; border-radius: 5px; cursor: pointer; transition: 0.2s; }
                                                                            button:hover { background: #00f2ff; color: black; }
                                                                                    .xp { margin-top: 20px; font-size: 1.5rem; }
                                                                                        </style>
                                                                                        </head>
                                                                                        <body>
                                                                                            <div class="header">OMNI-QUIZ PRO</div>
                                                                                                <div id="timer-bar"></div>
                                                                                                    <div class="xp">XP: <span id="score">0</span></div>
                                                                                                        <div id="question" class="question">SYNCHRONISATION AU SERVEUR...</div>
                                                                                                            <div id="options" class="options-grid"></div>

                                                                                                                <script>
                                                                                                                        let score = parseInt(localStorage.getItem('aloys_xp')) || 0;
                                                                                                                                let correctAnswer = "";
                                                                                                                                        let timer;
                                                                                                                                                let timeLeft = 15;

                                                                                                                                                        async function getNewQuestion() {
                                                                                                                                                                    clearInterval(timer);
                                                                                                                                                                                timeLeft = 15;
                                                                                                                                                                                            document.getElementById('timer-bar').style.width = "100%";
                                                                                                                                                                                                        document.getElementById('question').innerText = "CHARGEMENT...";
                                                                                                                                                                                                                    document.getElementById('options').innerHTML = "";

                                                                                                                                                                                                                                try {
                                                                                                                                                                                                                                                // On appelle la base mondiale (1 question au hasard à chaque fois)
                                                                                                                                                                                                                                                                const response = await fetch('https://opentdb.com/api.php?amount=1&type=multiple');
                                                                                                                                                                                                                                                                                const data = await response.json();
                                                                                                                                                                                                                                                                                                const q = data.results[0];

                                                                                                                                                                                                                                                                                                                correctAnswer = q.correct_answer;
                                                                                                                                                                                                                                                                                                                                document.getElementById('question').innerHTML = q.question;

                                                                                                                                                                                                                                                                                                                                                let choices = [...q.incorrect_answers, q.correct_answer].sort(() => Math.random() - 0.5);
                                                                                                                                                                                                                                                                                                                                                                choices.forEach(choice => {
                                                                                                                                                                                                                                                                                                                                                                                    const btn = document.createElement('button');
                                                                                                                                                                                                                                                                                                                                                                                                        btn.innerHTML = choice;
                                                                                                                                                                                                                                                                                                                                                                                                                            btn.onclick = () => check(choice === correctAnswer);
                                                                                                                                                                                                                                                                                                                                                                                                                                                document.getElementById('options').appendChild(btn);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                startTimer();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            } catch (e) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            document.getElementById('question').innerText = "ERREUR RÉSEAU... RECO";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            setTimeout(getNewQuestion, 2000);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        function startTimer() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    timer = setInterval(() => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    timeLeft--;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    document.getElementById('timer-bar').style.width = (timeLeft / 15) * 100 + "%";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    if(timeLeft <= 0) check(false);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }, 1000);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                function check(isCorrect) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            if(isCorrect) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            score += 100;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            alert("BRAVO ! +100 XP");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        } else {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        score = 0;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        alert("SYSTÈME ÉCHOUÉ. RESET À 0 XP.");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                localStorage.setItem('aloys_xp', score);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            document.getElementById('score').innerText = score;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        getNewQuestion();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        document.getElementById('score').innerText = score;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                getNewQuestion();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </html>
