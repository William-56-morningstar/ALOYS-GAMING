<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>OMNI-QUIZ | ALOYS GAMING</title>
                <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
                    <style>
                            :root { --neon: #00f2ff; --bg: #050508; }
                                    body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; text-align: center; margin: 0; }
                                            .header-game { padding: 20px; border-bottom: 1px solid var(--neon); font-family: 'Orbitron'; color: var(--neon); }
                                                    #quiz-container { max-width: 600px; margin: 50px auto; padding: 20px; background: rgba(255,255,255,0.05); border-radius: 15px; }
                                                            .question { font-size: 1.4rem; margin-bottom: 30px; }
                                                                    .options-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
                                                                            button { 
                                                                                        background: transparent; border: 1px solid var(--neon); color: white; 
                                                                                                    padding: 15px; border-radius: 10px; cursor: pointer; transition: 0.3s; 
                                                                                                                font-size: 1rem;
                                                                                                                        }
                                                                                                                                button:hover { background: var(--neon); color: black; box-shadow: 0 0 15px var(--neon); }
                                                                                                                                        .stats { margin-top: 30px; font-family: 'Orbitron'; font-size: 0.8rem; opacity: 0.7; }
                                                                                                                                                .back-link { display: block; margin-top: 40px; color: var(--neon); text-decoration: none; font-size: 0.8rem; }
                                                                                                                                                    </style>
                                                                                                                                                    </head>
                                                                                                                                                    <body>

                                                                                                                                                        <div class="header-game">MISSION: OMNI-QUIZ</div>

                                                                                                                                                            <div id="quiz-container">
                                                                                                                                                                    <div class="question" id="question">Initialisation du système...</div>
                                                                                                                                                                            <div class="options-grid" id="options">
                                                                                                                                                                                        </div>
                                                                                                                                                                                                <div class="stats">SCORE GLOBAL: <span id="current-score">0</span> XP</div>
                                                                                                                                                                                                        <a href="../../index.html" class="back-link">< REtour AU HUB</a>
                                                                                                                                                                                                            </div>

                                                                                                                                                                                                                <script>
                                                                                                                                                                                                                        const questions = [
                                                                                                                                                                                                                                    { q: "Quelle est la capitale du Cameroun ?", a: ["Douala", "Yaoundé", "Garoua", "Bafoussam"], c: 1 },
                                                                                                                                                                                                                                                { q: "Quel langage est utilisé pour le design web ?", a: ["Python", "C++", "CSS", "Java"], c: 2 },
                                                                                                                                                                                                                                                            { q: "Qui a fondé SpaceX ?", a: ["Bill Gates", "Elon Musk", "Jeff Bezos", "Steve Jobs"], c: 1 },
                                                                                                                                                                                                                                                                        { q: "En quelle année sommes-nous ?", a: ["2024", "2025", "2026", "2027"], c: 2 }
                                                                                                                                                                                                                                                                                ];

                                                                                                                                                                                                                                                                                        let score = parseInt(localStorage.getItem('aloys_xp')) || 0;
                                                                                                                                                                                                                                                                                                document.getElementById('current-score').innerText = score;

                                                                                                                                                                                                                                                                                                        function loadQuestion() {
                                                                                                                                                                                                                                                                                                                    const rand = Math.floor(Math.random() * questions.length);
                                                                                                                                                                                                                                                                                                                                const qData = questions[rand];
                                                                                                                                                                                                                                                                                                                                            document.getElementById('question').innerText = qData.q;
                                                                                                                                                                                                                                                                                                                                                        const optionsDiv = document.getElementById('options');
                                                                                                                                                                                                                                                                                                                                                                    optionsDiv.innerHTML = '';
                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                            qData.a.forEach((opt, index) => {
                                                                                                                                                                                                                                                                                                                                                                                                            const btn = document.createElement('button');
                                                                                                                                                                                                                                                                                                                                                                                                                            btn.innerText = opt;
                                                                                                                                                                                                                                                                                                                                                                                                                                            btn.onclick = () => checkAnswer(index, qData.c);
                                                                                                                                                                                                                                                                                                                                                                                                                                                            optionsDiv.appendChild(btn);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        function checkAnswer(index, correct) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    if(index === correct) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    score += 100;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    localStorage.setItem('aloys_xp', score);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    alert("SYSTÈME: RÉPONSE CORRECTE. +100 XP");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                } else {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                alert("SYSTÈME: ERREUR DÉTECTÉE.");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        document.getElementById('current-score').innerText = score;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    loadQuestion();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    loadQuestion();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </html>
