<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>OMNI-QUIZ INFINITY | FR</title>
                <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
                    <style>
                            body { background: #050508; color: white; font-family: 'Orbitron', sans-serif; text-align: center; margin: 0; overflow-x: hidden; }
                                    .header { padding: 20px; color: #00f2ff; border-bottom: 2px solid #00f2ff; text-shadow: 0 0 10px #00f2ff; font-size: 1.2rem; }
                                            #timer-bar { height: 5px; background: #00f2ff; width: 100%; transition: width 1s linear; box-shadow: 0 0 10px #00f2ff; }
                                                    .question { font-size: 1.1rem; margin: 30px 20px; min-height: 80px; font-family: 'Inter', sans-serif; line-height: 1.4; color: #e0e0e0; }
                                                            .options-grid { display: grid; grid-template-columns: 1fr; gap: 12px; padding: 0 20px; }
                                                                    button { background: rgba(0,242,255,0.05); border: 1px solid #00f2ff; color: white; padding: 14px; border-radius: 8px; cursor: pointer; transition: 0.3s; font-family: 'Inter', sans-serif; font-size: 0.9rem; }
                                                                            button:hover { background: #00f2ff; color: black; box-shadow: 0 0 15px #00f2ff; }
                                                                                    .xp { margin-top: 20px; font-size: 1.3rem; color: #00f2ff; }
                                                                                            .loading-text { font-size: 0.8rem; color: #888; margin-top: 10px; font-family: 'Inter'; }
                                                                                                </style>
                                                                                                </head>
                                                                                                <body>
                                                                                                    <div class="header">OMNI-QUIZ PRO</div>
                                                                                                        <div id="timer-bar"></div>
                                                                                                            <div class="xp">XP GLOBAL: <span id="score">0</span></div>
                                                                                                                <div id="question" class="question">PRÉPARATION DU TRADUCTEUR...</div>
                                                                                                                    <div id="options" class="options-grid"></div>
                                                                                                                        <div id="status" class="loading-text"></div>

                                                                                                                            <script>
                                                                                                                                    let score = parseInt(localStorage.getItem('aloys_xp')) || 0;
                                                                                                                                            let correctAnswer = "";
                                                                                                                                                    let timer;
                                                                                                                                                            let timeLeft = 15;

                                                                                                                                                                    // Fonction magique pour traduire le texte en français
                                                                                                                                                                            async function translate(text) {
                                                                                                                                                                                        try {
                                                                                                                                                                                                        const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|fr`);
                                                                                                                                                                                                                        const data = await res.json();
                                                                                                                                                                                                                                        return data.responseData.translatedText;
                                                                                                                                                                                                                                                    } catch (e) {
                                                                                                                                                                                                                                                                    return text; // Retourne l'original si erreur
                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                async function getNewQuestion() {
                                                                                                                                                                                                                                                                                                            clearInterval(timer);
                                                                                                                                                                                                                                                                                                                        timeLeft = 15;
                                                                                                                                                                                                                                                                                                                                    document.getElementById('timer-bar').style.width = "100%";
                                                                                                                                                                                                                                                                                                                                                document.getElementById('question').innerText = "RÉCUPÉRATION DE LA DONNÉE...";
                                                                                                                                                                                                                                                                                                                                                            document.getElementById('options').innerHTML = "";
                                                                                                                                                                                                                                                                                                                                                                        document.getElementById('status').innerText = "Connexion satellite en cours...";

                                                                                                                                                                                                                                                                                                                                                                                    try {
                                                                                                                                                                                                                                                                                                                                                                                                    const response = await fetch('https://opentdb.com/api.php?amount=1&type=multiple');
                                                                                                                                                                                                                                                                                                                                                                                                                    const data = await response.json();
                                                                                                                                                                                                                                                                                                                                                                                                                                    const q = data.results[0];

                                                                                                                                                                                                                                                                                                                                                                                                                                                    // Traduction de la question et des réponses
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    document.getElementById('status').innerText = "Traduction en français...";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const translatedQ = await translate(q.question);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    correctAnswer = await translate(q.correct_answer);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    let rawChoices = [...q.incorrect_answers, q.correct_answer];
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    let choices = [];
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    for(let choice of rawChoices) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        choices.push(await translate(choice));
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        // Mélange aléatoire
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        choices.sort(() => Math.random() - 0.5);

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        document.getElementById('question').innerHTML = translatedQ;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        document.getElementById('status').innerText = "";

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        choices.forEach(choice => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const btn = document.createElement('button');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                btn.innerHTML = choice;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    btn.onclick = () => check(choice === correctAnswer);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        document.getElementById('options').appendChild(btn);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        startTimer();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    } catch (e) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    document.getElementById('question').innerText = "ERREUR RÉSEAU... RECONNEXION";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    setTimeout(getNewQuestion, 2000);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                function startTimer() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            timer = setInterval(() => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            timeLeft--;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            document.getElementById('timer-bar').style.width = (timeLeft / 15) * 100 + "%";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            if(timeLeft <= 0) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                alert("TEMPS ÉCOULÉ !");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    check(false);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }, 1000);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                function check(isCorrect) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            clearInterval(timer);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        if(isCorrect) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        score += 100;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        alert("CORRECT ! +100 XP");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    } else {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    score = 0;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    alert("MAUVAISE RÉPONSE. RESET DU SCORE.");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            localStorage.setItem('aloys_xp', score);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        document.getElementById('score').innerText = score;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    getNewQuestion();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    document.getElementById('score').innerText = score;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            getNewQuestion();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </html>
