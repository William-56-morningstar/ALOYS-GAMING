<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>MATH STORM | ALOYS</title>
                <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
                    <style>
                            body { background: #050508; color: #00f2ff; font-family: 'Orbitron'; text-align: center; }
                                    .math-box { margin-top: 100px; font-size: 3rem; }
                                            input { background: transparent; border: 2px solid #00f2ff; color: white; padding: 10px; font-size: 2rem; width: 200px; text-align: center; }
                                                </style>
                                                </head>
                                                <body>
                                                    <h1>MATH STORM</h1>
                                                        <div class="math-box" id="problem">? + ?</div>
                                                            <br>
                                                                <input type="number" id="answer" placeholder="?" autofocus>
                                                                    <p>XP: <span id="score">0</span></p>

                                                                        <script>
                                                                                let score = parseInt(localStorage.getItem('aloys_xp')) || 0;
                                                                                        let currentAns;

                                                                                                function next() {
                                                                                                            let n1 = Math.floor(Math.random() * 50);
                                                                                                                        let n2 = Math.floor(Math.random() * 50);
                                                                                                                                    currentAns = n1 + n2;
                                                                                                                                                document.getElementById('problem').innerText = `${n1} + ${n2}`;
                                                                                                                                                            document.getElementById('answer').value = "";
                                                                                                                                                                    }

                                                                                                                                                                            document.getElementById('answer').oninput = function() {
                                                                                                                                                                                        if(parseInt(this.value) === currentAns) {
                                                                                                                                                                                                        score += 50;
                                                                                                                                                                                                                        localStorage.setItem('aloys_xp', score);
                                                                                                                                                                                                                                        document.getElementById('score').innerText = score;
                                                                                                                                                                                                                                                        next();
                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                            };

                                                                                                                                                                                                                                                                                    document.getElementById('score').innerText = score;
                                                                                                                                                                                                                                                                                            next();
                                                                                                                                                                                                                                                                                                </script>
                                                                                                                                                                                                                                                                                                </body>
                                                                                                                                                                                                                                                                                                </html>
